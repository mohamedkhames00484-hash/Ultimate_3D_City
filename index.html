<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ultimate Fortune City</title>
<style>
body { margin:0; overflow:hidden; background:#000205; font-family:Arial; touch-action:none; }
#ui { position:absolute; top:20px; left:20px; color:white; z-index:10; pointer-events:none; text-shadow: 0 0 10px #00f; }
#controls { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); display:grid; grid-template-columns: repeat(3, 65px); gap:12px; z-index:20; }
.btn { width:65px; height:65px; background:rgba(0,10,30,0.7); border:1px solid #00d4ff; border-radius:50%; color:#00d4ff; display:flex; align-items:center; justify-content:center; font-size:24px; pointer-events:auto; box-shadow: 0 0 15px rgba(0,212,255,0.3); }
#btn-forward { grid-column: 2; }
#btn-left { grid-column: 1; }
#btn-right { grid-column: 3; }
</style>
</head>
<body>
<div id="ui">
    <div style="font-size:22px; font-weight:bold; color:#00d4ff;">FORTUNE CODE CITY</div>
    <div style="font-size:12px; letter-spacing:2px;">BUILDING THE FUTURE</div>
</div>

<div id="controls">
    <div id="btn-forward" class="btn">↑</div>
    <div id="btn-left" class="btn">←</div>
    <div id="btn-right" class="btn">→</div>
    <div id="btn-back" class="btn">↓</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x00050a);
scene.fog = new THREE.FogExp2(0x000a15, 0.0035); // ضباب واقعي كثيف

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1500);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2));
document.body.appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0x001133, 0.5);
scene.add(ambient);
const blueLight = new THREE.PointLight(0x00d4ff, 2, 300);
blueLight.position.set(50, 100, 50);
scene.add(blueLight);

// Building Function with Neon Windows
function createBuilding(x, z) {
    const h = Math.random() * 120 + 40;
    const w = 18;
    const bGeo = new THREE.BoxGeometry(w, h, w);
    const bMat = new THREE.MeshStandardMaterial({color: 0x050508, roughness: 0.1, metalness: 0.8});
    const b = new THREE.Mesh(bGeo, bMat);
    b.position.set(x, h/2, z);
    scene.add(b);

    // Neon Strips (Blue & Orange)
    if(Math.random() > 0.5) {
        const neonGeo = new THREE.BoxGeometry(0.5, h, 0.5);
        const neonColor = Math.random() > 0.5 ? 0x00d4ff : 0xffaa00;
        const neonMat = new THREE.MeshBasicMaterial({color: neonColor});
        const neon = new THREE.Mesh(neonGeo, neonMat);
        neon.position.set(x + w/2 + 0.1, h/2, z + w/2 + 0.1);
        scene.add(neon);
    }
}

// Generate Dense City
for(let i=-400; i<400; i+=50) {
    for(let j=-400; j<400; j+=50) {
        if(Math.random() > 0.3) createBuilding(i, j);
    }
}
