<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate 4K 3D City</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#title { position:absolute; top:20px; left:20px; color:white; font-size:26px; z-index:10; }
#instructions {
position:absolute; top:60px; left:20px; color:white; font-size:16px; z-index:10;
}
</style>
</head>
<body>
<div id="title">Ultimate 4K 3D City</div>
<div id="instructions">Click to start, use WASD + Mouse to move</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000010);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(0,50,200);

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)); // 4K
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls FPS
const controls = new THREE.PointerLockControls(camera, document.body);
document.addEventListener('click', () => { controls.lock(); }, false);

// Lights
const moon = new THREE.DirectionalLight(0xddddff,1.2);
moon.position.set(300,500,300);
scene.add(moon);
const ambient = new THREE.AmbientLight(0x404040,0.5);
scene.add(ambient);

// Ground
const groundGeo = new THREE.PlaneGeometry(2000,2000);
const groundMat = new THREE.MeshStandardMaterial({color:0x111111});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Buildings
function createBuilding(x,z,height,color){
  const geo = new THREE.BoxGeometry(20,height,20);
  const mat = new THREE.MeshStandardMaterial({color:color, emissive:0x1111ff, emissiveIntensity:0.5});
  const b = new THREE.Mesh(geo, mat);
  b.position.set(x,height/2,z);
  scene.add(b);
}
for(let i=-400;i<=400;i+=25){
  for(let j=-400;j<=400;j+=25){
    if(Math.random()>0.3){
      const h = Math.random()*120+20;
      const c = 0x222222 + Math.random()*0x444444;
      createBuilding(i,j,h,c);
    }
  }
}

// Roads
for(let i=-400;i<=400;i+=50){
  const roadGeo = new THREE.BoxGeometry(2000,0.2,10);
  const roadMat = new THREE.MeshStandardMaterial({color:0x222222});
  const road = new THREE.Mesh(roadGeo,roadMat);
  road.position.z = i;
  road.position.y = 0.1;
  scene.add(road);
  const road2 = new THREE.Mesh(roadGeo,roadMat);
  road2.rotation.y=Math.PI/2;
  road2.position.x = i;
  road2.position.y = 0.1;
  scene.add(road2);
}

// Cars
const carGeo = new THREE.BoxGeometry(6,3,12);
const carMat = new THREE.MeshStandardMaterial({color:0xff0000});
const cars=[];
for(let i=0;i<20;i++){
  const car = new THREE.Mesh(carGeo, carMat);
  car.position.set(Math.random()*800-400,1.5,Math.random()*800-400);
  scene.add(car);
  cars.push(car);
}

// Stars
const starsGeo = new THREE.BufferGeometry();
const starVerts = [];
for(let i=0;i<3000;i++){
  starVerts.push(Math.random()*2000-1000,Math.random()*500+200,Math.random()*2000-1000);
}
starsGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3));
const starsMat = new THREE.PointsMaterial({color:0xffffff});
scene.add(new THREE.Points(starsGeo, starsMat));

// Rain
const rainGeo = new THREE.BufferGeometry();
const rainCount=2000;
const rainVerts=[];
for(let i=0;i<rainCount;i++){
  rainVerts.push(Math.random()*2000-1000,Math.random()*500,Math.random()*2000-1000);
}
rainGeo.setAttribute('position', new THREE.Float32BufferAttribute(rainVerts,3));
const rainMat = new THREE.PointsMaterial({color:0xaaaaff, size:1});
const rain = new THREE.Points(rainGeo,rainMat);
scene.add(rain);

// Movement
const move = {forward:false,back:false,left:false,right:false};
document.addEventListener('keydown', e=>{if(e.code==='KeyW') move.forward=true; if(e.code==='KeyS') move.back=true; if(e.code==='KeyA') move.left=true; if(e.code==='KeyD') move.right=true;});
document.addEventListener('keyup', e=>{if(e.code==='KeyW') move.forward=false; if(e.code==='KeyS') move.back=false; if(e.code==='KeyA') move.left=false; if(e.code==='KeyD') move.right=false;});

// Animate
function animate(){
  requestAnimationFrame(animate);

  // Car movement
  cars.forEach(c=>{
    c.position.x += Math.sin(Date.now()*0.001)*0.3;
    c.position.z += Math.cos(Date.now()*0.001)*0.3;
    if(c.position.x>1000) c.position.x=-1000;
    if(c.position.z>1000) c.position.z=-1000;
  });

  // Rain
  rain.geometry.attributes.position.array.forEach((v,i)=>{
    if(i%3===1){
      rain.geometry.attributes.position.array[i]-=2;
      if(rain.geometry.attributes.position.array[i]<0) rain.geometry.attributes.position.array[i]=500;
    }
  });
  rain.geometry.attributes.position.needsUpdate=true;

  // FPS movement
  const speed = 2;
  if(controls.isLocked){
    const dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    if(move.forward) controls.moveForward(speed);
    if(move.back) controls.moveForward(-speed);
    if(move.left) controls.moveRight(-speed);
    if(move.right) controls.moveRight(speed);
  }

  controls.update();
  renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
