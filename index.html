<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced 3D City</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#info{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:6px;
z-index:5;
}

#joystick{
position:fixed;
bottom:40px;
left:40px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.15);
}

#stick{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.5);
left:30px;
top:30px;
}

</style>

</head>

<body>

<div id="info">
WASD للتحرك — الهاتف باللمس
</div>

<div id="joystick">
<div id="stick"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
5000
);

camera.position.set(0,6,20);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

let sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(200,400,200);
sun.castShadow=true;
scene.add(sun);

scene.add(new THREE.AmbientLight(0x888888));

let ground = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0x3b3b3b})
);

ground.rotation.x=-Math.PI/2;
scene.add(ground);

function roadX(x){

let road=new THREE.Mesh(
new THREE.PlaneGeometry(30,5000),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);

road.rotation.x=-Math.PI/2;
road.position.set(x,0.02,0);

scene.add(road);

}

function roadZ(z){

let road=new THREE.Mesh(
new THREE.PlaneGeometry(5000,30),
new THREE.MeshStandardMaterial({color:0x1a1a1a})
);

road.rotation.x=-Math.PI/2;
road.position.set(0,0.02,z);

scene.add(road);

}

for(let i=-600;i<=600;i+=80){
roadX(i);
roadZ(i);
}

function building(x,z){

let h=Math.random()*150+30;

let mesh=new THREE.Mesh(
new THREE.BoxGeometry(40,h,40),
new THREE.MeshStandardMaterial({
color:new THREE.Color(Math.random()*0xffffff)
})
);

mesh.position.set(x,h/2,z);
mesh.castShadow=true;

scene.add(mesh);

}

for(let x=-600;x<=600;x+=80){
for(let z=-600;z<=600;z+=80){

if(Math.random()>0.35){
building(x,z);
}

}
}

function tree(x,z){

let trunk=new THREE.Mesh(
new THREE.CylinderGeometry(1.5,1.5,10),
new THREE.MeshStandardMaterial({color:0x8b5a2b})
);

trunk.position.set(x,5,z);

let leaves=new THREE.Mesh(
new THREE.SphereGeometry(6),
new THREE.MeshStandardMaterial({color:0x2e8b57})
);

leaves.position.set(x,12,z);

scene.add(trunk);
scene.add(leaves);

}

for(let i=0;i<200;i++){
tree(
Math.random()*2000-1000,
Math.random()*2000-1000
);
}

let cars=[];

function createCar(x,z){

let car=new THREE.Mesh(
new THREE.BoxGeometry(10,4,5),
new THREE.MeshStandardMaterial({color:0xff4444})
);

car.position.set(x,2,z);

scene.add(car);
cars.push(car);

}

for(let i=0;i<30;i++){
createCar(Math.random()*400-200,Math.random()*400-200);
}

let keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

let speed=1.2;

function move(){

if(keys["w"]) camera.position.z-=speed;
if(keys["s"]) camera.position.z+=speed;
if(keys["a"]) camera.position.x-=speed;
if(keys["d"]) camera.position.x+=speed;

}

let joystick=document.getElementById("joystick");
let stick=document.getElementById("stick");

let dragging=false;

joystick.addEventListener("touchstart",()=>{
dragging=true;
});

document.addEventListener("touchend",()=>{
dragging=false;
stick.style.left="30px";
stick.style.top="30px";
});

document.addEventListener("touchmove",e=>{

if(!dragging) return;

let touch=e.touches[0];
let rect=joystick.getBoundingClientRect();

let x=touch.clientX-rect.left-60;
let y=touch.clientY-rect.top-60;

x=Math.max(-40,Math.min(40,x));
y=Math.max(-40,Math.min(40,y));

stick.style.left=(x+60-30)+"px";
stick.style.top=(y+60-30)+"px";

camera.position.x+=x*0.1;
camera.position.z+=y*0.1;

});

function animate(){

requestAnimationFrame(animate);

move();

cars.forEach(c=>{
c.position.x+=0.4;
if(c.position.x>600) c.position.x=-600;
});

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
