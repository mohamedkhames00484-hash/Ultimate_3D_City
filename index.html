  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D City - Mobile Ready</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; touch-action:none; }
#ui { position:absolute; top:20px; left:20px; color:white; z-index:10; pointer-events:none; }
#controls-wrapper { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); display:grid; grid-template-columns: repeat(3, 60px); gap:10px; z-index:20; }
.btn { width:60px; height:60px; background:rgba(255,255,255,0.2); border:2px solid white; border-radius:10px; color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; pointer-events:auto; -webkit-user-select:none; }
.btn:active { background:rgba(255,255,255,0.5); }
#btn-forward { grid-column: 2; }
#btn-left { grid-column: 1; }
#btn-right { grid-column: 3; }
#btn-back { grid-column: 2; }
</style>
</head>
<body>
<div id="ui">
    <div style="font-size:20px;">3D Night City</div>
    <div style="font-size:12px;">Touch buttons to move | Drag to look around</div>
</div>

<div id="controls-wrapper">
    <div id="btn-forward" class="btn">↑</div>
    <div id="btn-left" class="btn">←</div>
    <div id="btn-right" class="btn">→</div>
    <div id="btn-back" class="btn">↓</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000005);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1.5 : 1);
document.body.appendChild(renderer.domElement);

// Lights
const ambient = new THREE.AmbientLight(0x404040, 0.8);
scene.add(ambient);
const light = new THREE.PointLight(0xffffff, 1, 500);
light.position.set(0, 100, 0);
scene.add(light);

// City Creation
const bGeo = new THREE.BoxGeometry(1, 1, 1);
for(let i=0; i<200; i++) {
    const h = Math.random() * 30 + 5;
    const mat = new THREE.MeshStandardMaterial({color: 0x222222, emissive: Math.random() > 0.5 ? 0x0000ff : 0xff0000, emissiveIntensity: 0.2});
    const b = new THREE.Mesh(bGeo, mat);
    b.scale.set(10, h, 10);
    b.position.set(Math.random()*400-200, h/2, Math.random()*400-200);
    scene.add(b);
}

// Ground
const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000,1000), new THREE.MeshStandardMaterial({color:0x111111}));
ground.rotation.x = -Math.PI/2;
scene.add(ground);

camera.position.set(0, 5, 50);

// Touch movement variables
let move = { f:0, b:0, l:0, r:0 };
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); move[key] = 1; };
    el.ontouchend = (e) => { e.preventDefault(); move[key] = 0; };
};
setupBtn('btn-forward', 'f'); setupBtn('btn-back', 'b'); setupBtn('btn-left', 'l'); setupBtn('btn-right', 'r');

// Drag to look around
let lat = 0, lon = 0, onMouseDownLon = 0, onMouseDownLat = 0, onMouseDownMouseX = 0, onMouseDownMouseY = 0;
document.addEventListener('touchstart', (e) => {
    onMouseDownMouseX = e.touches[0].pageX; onMouseDownMouseY = e.touches[0].pageY;
    onMouseDownLon = lon; onMouseDownLat = lat;
});
document.addEventListener('touchmove', (e) => {
    lon = (onMouseDownMouseX - e.touches[0].pageX) * 0.1 + onMouseDownLon;
    lat = (e.touches[0].pageY - onMouseDownMouseY) * 0.1 + onMouseDownLat;
    lat = Math.max(-85, Math.min(85, lat));
});

function animate() {
    requestAnimationFrame(animate);
    
    // Rotation logic
    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    const target = new THREE.Vector3();
    target.setFromSphericalCoords(1, phi, theta).add(camera.position);
    camera.lookAt(target);

    // Movement logic
    const speed = 0.5;
    const forward = new THREE.Vector3();
    camera.getWorldDirection(forward); forward.y = 0; forward.normalize();
    const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).normalize();

    if(move.f) camera.position.addScaledVector(forward, speed);
    if(move.b) camera.position.addScaledVector(forward, -speed);
    if(move.l) camera.position.addScaledVector(right, -speed);
    if(move.r) camera.position.addScaledVector(right, speed);

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
